<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مركز التدريب الإعلامي | Media Training Hub</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* تصميم زجاجي سينمائي بسيط ومضمون التشغيل */
        body { 
            background: #09090b; color: white; font-family: sans-serif; 
            display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0;
        }
        .container { 
            background: rgba(255,255,255,0.05); backdrop-filter: blur(10px);
            padding: 30px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1);
            width: 400px; text-align: center;
        }
        textarea, select, button { 
            width: 100%; margin-top: 15px; padding: 12px; border-radius: 10px; border: none; 
        }
        button { background: #2563eb; color: white; cursor: pointer; font-weight: bold; }
        #result { margin-top: 20px; font-size: 0.9rem; color: #ccc; text-align: right; }
    </style>
</head>
<body>
    <div class="container">
        <h2>مركز التدريب الإعلامي</h2>
        <textarea id="desc" placeholder="وصف الصورة..."></textarea>
        <select id="phase">
            <option value="بداية">انطلاق</option>
            <option value="تغطية">تغطية</option>
            <option value="ختام">ختام</option>
        </select>
        <button onclick="runAI()">توليد المحتوى الذكي</button>
        <div id="result"></div>
    </div>

    <script>
        async function runAI() {
            const API_KEY = "AIzaSyBpE1qLlq2lej5YMtDunOyQBKxiR-CInJM"; // تأكد أن المفتاح يعمل
            const prompt = document.getElementById('desc').value;
            const phase = document.getElementById('phase').value;
            const resDiv = document.getElementById('result');

            resDiv.innerHTML = "جاري التوليد...";
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({ contents: [{ parts: [{ text: `اكتب كابشن انستجرام عن: ${prompt} في مرحلة ${phase}` }] }] })
                });
                const data = await response.json();
                resDiv.innerHTML = data.candidates[0].content.parts[0].text;
            } catch (e) { resDiv.innerHTML = "خطأ في الاتصال."; }
        }
    </script>
</body>
</html>
